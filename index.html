<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
            background-color: white;
            margin: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .media-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .media-container div {
            flex: 1;
            margin: 0 10px;
        }
        video {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        @media (max-width: 768px) {
            .media-container {
                flex-direction: column;
            }
            .media-container div {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到我的网页</h1>
    </header>

    <nav>
        <a href="#home">首页</a>
        <a href="#about">关于我们</a>
        <a href="#services">服务</a>
        <a href="#contact">联系我们</a>
    </nav>

    <div class="content">
        <h2>首页</h2>
        <p>这是一个简单的网页示例，展示了如何使用HTML和CSS创建一个基本的页面布局。</p>
        <p>你可以在这里添加更多内容，比如图片、列表、表格等。</p>
        
        <h3>示例列表</h3>
        <ul>
            <li>列表项 1</li>
            <li>列表项 2</li>
            <li>列表项 3</li>
        </ul>

        <h3>示例表格</h3>
        <table border="1" cellpadding="10">
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>城市</th>
            </tr>
            <tr>
                <td>张三</td>
                <td>25</td>
                <td>北京</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>30</td>
                <td>上海</td>
            </tr>
        </table>

        <h3>图片和视频</h3>
        <div class="media-container">
            <div>
                <h4>图片示例</h4>
                <img src="https://via.placeholder.com/400x300" alt="示例图片" title="这是一张示例图片">
                <p>这是一张示例图片，使用了占位图服务。</p>
            </div>
            <div>
                <h4>视频示例</h4>
                <video controls autoplay muted>
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    您的浏览器不支持视频标签。
                </video>
                <p>这是一个在线视频示例，使用了HTML5的视频标签。</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 我的网页. 保留所有权利。</p>
    </footer>

</body>
</html>
